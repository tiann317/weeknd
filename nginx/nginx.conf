server {
    listen 80;
    server_name datastream-cdn.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name datastream-cdn.xyz;

    ssl_certificate /etc/letsencrypt/live/datastream-cdn.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datastream-cdn.xyz/privkey.pem;

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend backend:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    } 

    location / {
        set $frontend frontend:80;
        proxy_pass http://$frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
