<nav class="navbar">
  <div class="nav-logo">weeknd</div>
  <div class="nav-links">
    <button>Home</button>
    <button>Routes</button>
    <button>Feed</button>
    <button>Saved</button>
  </div>
  <div class="nav-actions">
    @if (auth.isLoggedIn()) {
      <span class="nav-username">{{ auth.currentUser()?.username }}</span>
      <button class="login-btn" (click)="auth.logout()">Logout</button>
    } @else {
      <button class="login-btn" (click)="showLoginModal.set(true)">Login</button>
    }
  </div>
</nav>

<div id="map" #map></div>

@if (selected(); as h) {
  <aside class="hike-detail">
  <h2>{{ h.title }}</h2>
  <p>{{ h.distance_km }} km · {{ h.duration_min }} min · {{ h.region }}</p>
    @if (h.start_station) {
      <p>Start: {{ h.start_station.name }}</p>
    }
  <button (click)="selected.set(null)">Close</button>
  </aside>
}

@if (showLoginModal()) {
  <app-login-modal (closed)="showLoginModal.set(false)" />
}
